<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Intro</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: black;
}

/* VIDEO */
#introVideo {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 1;
}

/* ZOOM + FADE İLE AÇILAN SİTE */
#siteReveal {
    position: fixed;
    inset: 0;
    background: #0b0b0b; /* sitenin ana rengi */
    opacity: 0;
    transform: scale(0.6);
    transition:
        opacity 0.5s ease,
        transform 0.6s cubic-bezier(.25,.8,.25,1);
    z-index: 2;
}

#siteReveal.active {
    opacity: 1;
    transform: scale(1);
}

/* SKIP */
#skip {
    position: fixed;
    bottom: 24px;
    right: 24px;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    color: white;
    opacity: 0.6;
    cursor: pointer;
    z-index: 3;
    user-select: none;
}

#skip:hover {
    opacity: 1;
}
</style>
</head>

<body>

<video id="introVideo" autoplay muted playsinline>
    <source src="intro.mp4" type="video/mp4">
</video>

<div id="siteReveal"></div>
<div id="skip">Skip</div>

<script>
const video = document.getElementById("introVideo");
const reveal = document.getElementById("siteReveal");
const skip = document.getElementById("skip");

/* Sekme içinde daha önce oynadıysa geç */
if (sessionStorage.getItem("introPlayed")) {
    window.location.replace("home.html");
}

/* 3.5 saniyede fade + zoom başlasın */
setTimeout(() => {
    reveal.classList.add("active");
}, 3500);

/* 4 saniyede siteye geç */
setTimeout(() => {
    sessionStorage.setItem("introPlayed", "true");
    window.location.replace("home.html");
}, 4000);

/* Skip */
skip.onclick = () => {
    sessionStorage.setItem("introPlayed", "true");
    window.location.replace("home.html");
};
</script>

</body>
</html>
